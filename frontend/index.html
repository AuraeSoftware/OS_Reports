<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>OS Reports â€” Insurance Document Autofill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== OS2 Studio brand tokens: amber / charcoal / lime ===== */
  :root{
    --bg:#FAFAF8;
    --surface:#FFFFFF;
    --surface-2:#F3F2EE;
    --ink:#231F20;           /* charcoal */
    --ink-soft:#6B6663;
    --charcoal:#231F20;
    --charcoal-dark:#161314;
    --amber:#FFB600;
    --amber-ink:#231F20;     /* text sitting on amber */
    --amber-soft:#FFF1CC;
    --lime:#B5DE00;
    --lime-ink:#2B3300;
    --lime-soft:#EEF7CC;
    --danger:#C0392B;
    --danger-soft:#FBEAE8;
    --line:#E7E4DD;
    --radius:14px;
    --shadow: 0 1px 2px rgba(35,31,32,0.05), 0 8px 24px rgba(35,31,32,0.07);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;height:100%;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:'Inter',sans-serif;cursor:pointer;}
  ::selection{background:var(--amber-soft);}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

  /* ---------- layout shell ---------- */
  #app{min-height:100vh;display:flex;flex-direction:column;}
  .shell{display:flex;flex:1;min-height:0;}
  .sidebar{
    width:240px;flex-shrink:0;background:var(--charcoal);color:#EDEBE8;
    display:flex;flex-direction:column;padding:24px 16px;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--amber-ink);flex-shrink:0;}
  .brand-name{font-family:'Space Grotesk';font-weight:600;font-size:16px;line-height:1.15;}
  .brand-sub{font-size:11px;color:#B5DE00;font-family:'IBM Plex Mono';}
  .nav-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8A8580;padding:14px 12px 6px;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;
    color:#C9C4BE;font-size:14px;font-weight:500;text-decoration:none;background:none;border:none;width:100%;text-align:left;
    transition:background .15s ease, color .15s ease;
  }
  .nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-item.active{background:var(--amber);color:var(--amber-ink);font-weight:600;}
  .nav-item.active svg{opacity:1;}
  .sidebar-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(255,255,255,0.08);}
  .user-chip{display:flex;align-items:center;gap:10px;padding:10px 4px;}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--lime-ink);flex-shrink:0;}
  .user-meta{min-width:0;}
  .user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-role{font-size:11px;color:#9A958F;text-transform:capitalize;}
  .logout-btn{background:none;border:none;color:#9A958F;font-size:12px;padding:8px 4px 0;width:100%;text-align:left;}
  .logout-btn:hover{color:#fff;}

  .main{flex:1;min-width:0;overflow-y:auto;padding:32px 40px 80px;}
  .topbar{display:none;}

  .container{max-width:980px;margin:0 auto;}
  .page-head{margin-bottom:28px;}
  .page-head h1{font-size:26px;margin:0 0 4px;}
  .page-head p{margin:0;color:var(--ink-soft);font-size:14px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card-pad{padding:24px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-size:14px;font-weight:600;padding:11px 18px;border:none;transition:transform .1s ease, background .15s ease;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--amber);color:var(--amber-ink);}
  .btn-primary:hover{background:#E6A400;}
  .btn-dark{background:var(--charcoal);color:#fff;}
  .btn-dark:hover{background:var(--charcoal-dark);}
  .btn-ghost{background:transparent;color:var(--charcoal);border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--surface-2);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-full{width:100%;}

  input[type=text],input[type=email],input[type=password],textarea,select{
    width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--surface-2);color:var(--ink);font-family:'Inter';
  }
  input:focus,textarea:focus,select:focus{background:#fff;border-color:var(--charcoal);}
  label.field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;font-family:'IBM Plex Mono';white-space:nowrap;}
  .badge-draft{background:#EDEAE3;color:#8A8479;}
  .badge-extracting{background:var(--amber-soft);color:#8A5F00;}
  .badge-review{background:#E9E7E2;color:var(--charcoal);}
  .badge-completed{background:var(--lime-soft);color:#5A7300;}
  .badge-failed{background:var(--danger-soft);color:var(--danger);}
  .role-pill{display:inline-flex;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:100px;}
  .role-admin{background:var(--charcoal);color:#fff;}
  .role-reviewer{background:var(--amber-soft);color:#8A5F00;}
  .role-user{background:var(--surface-2);color:var(--ink-soft);}

  /* ---------- auth screen ---------- */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(circle at 15% 15%, rgba(255,182,0,0.12), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(181,222,0,0.12), transparent 45%), var(--bg);}
  .auth-card{width:100%;max-width:400px;}
  .auth-brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px;}
  .auth-brand .brand-mark{width:42px;height:42px;font-size:16px;}
  .auth-brand-name{font-family:'Space Grotesk';font-weight:700;font-size:20px;}
  .auth-toggle{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:22px;}
  .auth-toggle button{flex:1;padding:9px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .auth-toggle button.active{background:#fff;color:var(--charcoal);box-shadow:0 1px 3px rgba(35,31,32,0.14);}
  .form-row{margin-bottom:14px;}
  .error-banner{background:var(--danger-soft);color:var(--danger);font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:14px;}

  /* ---------- upload dropzone ---------- */
  .dropzone{border:2px dashed var(--line);border-radius:var(--radius);padding:32px 20px;text-align:center;background:var(--surface-2);transition:border-color .15s, background .15s;}
  .dropzone.drag{border-color:var(--amber);background:var(--amber-soft);}
  .dropzone svg{width:32px;height:32px;color:var(--ink-soft);margin-bottom:10px;}
  .dropzone-title{font-weight:600;font-size:14px;margin-bottom:2px;}
  .dropzone-sub{font-size:12px;color:var(--ink-soft);}

  .file-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-top:8px;background:#fff;}
  .file-icon{width:32px;height:32px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-family:'IBM Plex Mono';color:var(--ink-soft);}
  .file-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-remove{background:none;border:none;color:var(--ink-soft);font-size:18px;line-height:1;padding:4px;}
  .file-remove:hover{color:var(--danger);}

  /* ---------- stepper ---------- */
  .stepper{display:flex;align-items:center;gap:6px;margin-bottom:28px;flex-wrap:wrap;}
  .step-pill{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 8px;border-radius:100px;background:var(--surface-2);border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--ink-soft);}
  .step-pill.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
  .step-pill.done{background:var(--lime-soft);color:#5A7300;border-color:transparent;}
  .step-num{width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;font-size:10px;}
  .step-pill.active .step-num{background:rgba(255,255,255,0.25);}
  .step-connector{width:16px;height:1px;background:var(--line);}

  /* ---------- scan motif (signature element) ---------- */
  .scan-card{position:relative;overflow:hidden;border-radius:var(--radius);background:var(--charcoal);color:#fff;padding:28px 24px;}
  .scan-card::after{
    content:"";position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg, transparent, var(--lime), transparent);
    animation:scan 2.2s ease-in-out infinite;box-shadow:0 0 16px 2px rgba(181,222,0,0.55);
  }
  @keyframes scan{0%{top:8%;}50%{top:88%;}100%{top:8%;}}
  .scan-title{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin-bottom:4px;}
  .scan-sub{font-size:13px;color:#B8B3AD;font-family:'IBM Plex Mono';}
  .scan-doc-list{margin-top:18px;display:flex;flex-direction:column;gap:8px;}
  .scan-doc-row{display:flex;align-items:center;gap:10px;font-size:12px;color:#D8D4CE;}
  .scan-dot{width:7px;height:7px;border-radius:50%;background:#6E6A66;flex-shrink:0;}
  .scan-dot.done{background:var(--lime);}
  .scan-dot.processing{background:var(--amber);animation:pulse 1s infinite;}
  .scan-dot.failed{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  /* ---------- review field cards ---------- */
  .field-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .field-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;}
  .field-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
  .field-name{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
  .source-chip{font-size:10px;font-family:'IBM Plex Mono';color:var(--ink-soft);background:var(--surface-2);padding:2px 8px;border-radius:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  .source-chip.empty{color:#B7B2AA;}

  /* ---------- reports list ---------- */
  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-chip{padding:6px 14px;border-radius:100px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--ink-soft);}
  .filter-chip.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
  .report-row{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:10px;text-decoration:none;transition:border-color .15s;}
  .report-row:hover{border-color:var(--amber);}
  .report-icon{width:38px;height:38px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .report-meta{flex:1;min-width:0;}
  .report-name{font-weight:600;font-size:14px;margin-bottom:2px;}
  .report-date{font-size:12px;color:var(--ink-soft);}
  .owner-chip{font-size:11px;color:var(--ink-soft);background:var(--surface-2);padding:2px 9px;border-radius:100px;white-space:nowrap;}

  .empty-state{text-align:center;padding:56px 24px;color:var(--ink-soft);}
  .empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:.5;}

  /* ---------- stat cards (admin overview) ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;}
  @media(min-width:640px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
  .stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .stat-value{font-family:'Space Grotesk';font-size:28px;font-weight:700;}
  .stat-label{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .stat-card.accent{background:var(--charcoal);color:#fff;}
  .stat-card.accent .stat-label{color:#B8B3AD;}

  /* ---------- users table ---------- */
  .user-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px;flex-wrap:wrap;}
  .user-row-meta{flex:1;min-width:180px;}
  .user-row-name{font-weight:600;font-size:14px;}
  .user-row-email{font-size:12px;color:var(--ink-soft);}
  .role-select{width:auto;padding:7px 10px;font-size:12px;}

  /* ---------- mobile bottom nav ---------- */
  .bottom-nav{display:none;}

  @media (max-width: 860px){
    .sidebar{display:none;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
      background:var(--charcoal);color:#fff;position:sticky;top:0;z-index:20;
    }
    .topbar .brand{padding:0;}
    .main{padding:20px 16px 90px;}
    .bottom-nav{
      display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);
      padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30;box-shadow:0 -2px 12px rgba(35,31,32,0.08);
    }
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--ink-soft);font-size:10px;font-weight:600;padding:6px 2px;border-radius:10px;}
    .bottom-nav-item svg{width:20px;height:20px;}
    .bottom-nav-item.active{color:var(--charcoal);}
    .field-grid{grid-template-columns:1fr;}
  }
  @media (min-width: 640px) and (max-width:860px){
    .field-grid{grid-template-columns:1fr 1fr;}
  }
  @media (min-width: 861px){
    .field-grid{grid-template-columns:1fr 1fr;}
  }

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:#fff;
    padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .toast.error{background:var(--danger);}
  .toast.success{background:#5A7300;}

  .spinner{width:16px;height:16px;border:2px solid rgba(35,31,32,0.25);border-top-color:var(--charcoal);border-radius:50%;animation:spin .7s linear infinite;}
  .spinner.on-dark{border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   OS Reports â€” configuration
   Change API_BASE to your deployed backend URL after Railway deploy.
   ============================================================ */
const API_BASE = window.location.hostname === "localhost"
  ? "http://localhost:8000/api"
  : "https://helpful-charisma-production-0fa2.up.railway.app/api";

/* ============================================================
   Tiny state + helpers
   ============================================================ */
const state = {
  token: localStorage.getItem("osr_token") || null,
  user: JSON.parse(localStorage.getItem("osr_user") || "null"),
  route: "dashboard",
  templates: [],
  reports: [],
  reportFilter: "all",
  users: [],
  stats: null,
  currentReport: null,
  pollTimer: null,
};
if (state.user) {
  state.route = state.user.role === "admin" ? "overview" : "dashboard";
}

function toast(msg, kind){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (kind ? " " + kind : "");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

async function api(path, { method="GET", body, isForm=false } = {}){
  const headers = {};
  if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
  if (!isForm && body) headers["Content-Type"] = "application/json";

  const res = await fetch(`${API_BASE}${path}`, {
    method,
    headers,
    body: isForm ? body : (body ? JSON.stringify(body) : undefined),
  });

  if (res.status === 401) {
    logout();
    throw new Error("Session expired â€” please sign in again.");
  }
  let data = null;
  try { data = await res.json(); } catch(e) {}
  if (!res.ok) {
    throw new Error((data && data.detail) || `Request failed (${res.status})`);
  }
  return data;
}

function setToken(token, user){
  state.token = token;
  state.user = user;
  localStorage.setItem("osr_token", token);
  localStorage.setItem("osr_user", JSON.stringify(user));
}
function logout(){
  state.token = null; state.user = null;
  localStorage.removeItem("osr_token"); localStorage.removeItem("osr_user");
  clearInterval(state.pollTimer);
  render();
}
function navigate(route){
  state.route = route;
  render();
  window.scrollTo(0,0);
}
function initials(name){
  return (name || "?").split(" ").filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join("");
}
function fmtDate(iso){
  try { return new Date(iso).toLocaleDateString(undefined, {day:"numeric", month:"short", year:"numeric"}); }
  catch(e){ return iso; }
}
function statusBadge(status){
  const map = {
    draft: "Draft", extracting: "Extracting", review: "Needs review",
    completed: "Completed", failed: "Failed",
  };
  return `<span class="badge badge-${status}">${map[status] || status}</span>`;
}
function rolePill(role){
  return `<span class="role-pill role-${role}">${role}</span>`;
}
function isStaff(){ return state.user && (state.user.role === "admin" || state.user.role === "reviewer"); }
function isAdmin(){ return state.user && state.user.role === "admin"; }

/* ============================================================
   Icons
   ============================================================ */
const ICON = {
  logo: `OR`,
  overview: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>`,
  dashboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>`,
  templates: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>`,
  users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
  upload: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>`,
  doc: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>`,
  empty: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6m-6 4h6M9 8h1"/><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12M6 11l6 6 6-6"/><path d="M4 20h16"/></svg>`,
};

/* ============================================================
   Render root
   ============================================================ */
function render(){
  const app = document.getElementById("app");
  if (!state.token || !state.user){
    app.innerHTML = renderAuth();
    bindAuthEvents();
    return;
  }
  app.innerHTML = renderShell();
  bindShellEvents();
  loadRouteData();
}

/* ============================================================
   AUTH SCREEN
   ============================================================ */
let authMode = "login";
function renderAuth(){
  return `

        <div class="auth-brand-name">OS Reports</div>
      </div>
      <div class="card card-pad">
        <div class="auth-toggle">
          <button data-mode="login" class="${authMode==='login'?'active':''}">Sign in</button>
          <button data-mode="register" class="${authMode==='register'?'active':''}">Create account</button>
        </div>
        <div id="auth-error"></div>
        <form id="auth-form">
          ${authMode === "register" ? `
          <div class="form-row">

            <input type="text" name="full_name" placeholder="Your name" required />
          </div>` : ``}
          <div class="form-row">

            <input type="email" name="email" placeholder="you@os2studio.com" required />
          </div>
          <div class="form-row">
            <label class="field-label">Password</label>
            <input type="password" name="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="auth-submit">
            ${authMode === "login" ? "Sign in" : "Create account"}
          </button>
        </form>
      </div>
      <p style="text-align:center;font-size:12px;color:var(--ink-soft);margin-top:16px;">OS2 Studio internal tool Â· insurance document autofill</p>
    </div>
  </div>`;
}

function bindAuthEvents(){
  document.querySelectorAll(".auth-toggle button").forEach(btn => {
    btn.addEventListener("click", () => { authMode = btn.dataset.mode; render(); });
  });
  const form = document.getElementById("auth-form");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());
    const submitBtn = document.getElementById("auth-submit");
    submitBtn.disabled = true;
    submitBtn.textContent = "Please waitâ€¦";
    document.getElementById("auth-error").innerHTML = "";
    try {
      const data = await api(`/auth/${authMode === "login" ? "login" : "register"}`, { method: "POST", body: payload });
      setToken(data.access_token, data.user);
      navigate(data.user.role === "admin" ? "overview" : "dashboard");
    } catch (err) {
      document.getElementById("auth-error").innerHTML = `<div class="error-banner">${err.message}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = authMode === "login" ? "Sign in" : "Create account";
    }
  });
}

/* ============================================================
   ROUTE DATA LOADING
   ============================================================ */
async function loadRouteData(){
  const outlet = document.getElementById("outlet");
  const [base, id] = state.route.split("/");
  clearInterval(state.pollTimer);

  if (base === "overview" && isAdmin()){
    outlet.innerHTML = loadingBlock();
    try {
      state.stats = await api("/admin/stats");
      outlet.innerHTML = renderOverview();
      bindOverviewEvents();
    } catch (err) { toast(err.message, "error"); }
  }
  else if (base === "dashboard"){
    outlet.innerHTML = loadingBlock();
    try {
      state.reports = await api(`/reports${isStaff() ? "?scope=all" : ""}`);
      outlet.innerHTML = renderDashboard();
      bindDashboardEvents();
    } catch (err) { toast(err.message, "error"); }
  }
  else if (base === "templates"){
    outlet.innerHTML = loadingBlock();
    try {
      state.templates = await api("/templates");
      outlet.innerHTML = renderTemplates();
      bindTemplatesEvents();
    } catch (err) { toast(err.message, "error"); }
  }
  else if (base === "users" && isAdmin()){
    outlet.innerHTML = loadingBlock();
    try {
      state.users = await api("/admin/users");
      outlet.innerHTML = renderUsers();
      bindUsersEvents();
    } catch (err) { toast(err.message, "error"); }
  }
  else if (base === "new-report"){
    try { state.templates = await api("/templates"); } catch(e){}
    outlet.innerHTML = renderNewReport();
    bindNewReportEvents();
  }
  else if (base === "report" && id){
    outlet.innerHTML = loadingBlock();
    try {
      state.currentReport = await api(`/reports/${id}`);
      outlet.innerHTML = renderReportDetail();
      bindReportDetailEvents();
      if (["extracting"].includes(state.currentReport.status)){
        state.pollTimer = setInterval(async () => {
          try {
            state.currentReport = await api(`/reports/${id}`);
            if (state.route === `report/${id}`){
              outlet.innerHTML = renderReportDetail();
              bindReportDetailEvents();
            }
            if (state.currentReport.status !== "extracting") clearInterval(state.pollTimer);
          } catch(e){ clearInterval(state.pollTimer); }
        }, 2500);
      }
    } catch (err) { toast(err.message, "error"); navigate("dashboard"); }
  }
}

function loadingBlock(){
  return `<div style="display:flex;justify-content:center;padding:80px 0;"><div class="spinner"></div></div>`;
}

        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${t.fields.slice(0,8).map(f => `<span class="source-chip">${f.label}</span>`).join("")}

        </div>
      </div>
    `).join("")}
  `;
}
function bindTemplatesEvents(){
  const dz = document.getElementById("tpl-dropzone");
  const fileInput = document.getElementById("tpl-file");
  const uploadBtn = document.getElementById("tpl-upload-btn");
  let selectedFile = null;

  dz.addEventListener("click", () => fileInput.click());
  ["dragover","dragenter"].forEach(evt => dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.add("drag"); }));
  ["dragleave","drop"].forEach(evt => dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.remove("drag"); }));
  dz.addEventListener("drop", (e) => { if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f){
    selectedFile = f;
    document.getElementById("tpl-file-preview").innerHTML = `
      <div class="file-row"><div class="file-icon">DOCX</div><div class="file-name">${f.name}</div></div>`;
    uploadBtn.disabled = false;
  }

  uploadBtn.addEventListener("click", async () => {
    const name = document.getElementById("tpl-name").value.trim();
    if (!name){ toast("Give the template a name first", "error"); return; }
    if (!selectedFile){ toast("Choose a .docx file", "error"); return; }
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = `<div class="spinner on-dark"></div> Reading templateâ€¦`;
    try {
      const fd = new FormData();
      fd.append("name", name);
      fd.append("file", selectedFile);
      await api("/templates/upload", { method: "POST", body: fd, isForm: true });
      toast("Template uploaded and fields detected", "success");
      navigate("templates");
    } catch (err) {
      toast(err.message, "error");
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload & detect fields";
    }
  });
}

/* ============================================================
   NEW REPORT WIZARD
   ============================================================ */
let newReportState = { step: 1, templateId: null, name: "", files: [], reportId: null };

function renderNewReport(){
  newReportState = { step: 1, templateId: null, name: "", files: [], reportId: null };
  return `<div id="wizard-outlet"></div>`;
}
function bindNewReportEvents(){
  renderWizardStep();
}

function stepper(){
  const labels = ["Template", "Documents", "Extracting", "Review", "Done"];
  return `<div class="stepper">${labels.map((l,i) => {
    const n = i+1;
    const cls = n < newReportState.step ? "done" : (n === newReportState.step ? "active" : "");
    return `<div class="step-pill ${cls}"><div class="step-num">${n < newReportState.step ? "âœ“" : n}</div>${l}</div>` + (i < labels.length-1 ? `<div class="step-connector"></div>` : "");
  }).join("")}</div>`;
}

function renderWizardStep(){
  const outlet = document.getElementById("wizard-outlet");
  if (!outlet) return;

  if (newReportState.step === 1){
    outlet.innerHTML = `
      <div class="page-head"><h1>New report</h1><p>Pick the template this report should be filled into.</p></div>
      ${stepper()}
      ${state.templates.length === 0 ? `
        <div class="card"><div class="empty-state">
          ${ICON.templates}
          <div style="font-weight:600;color:var(--ink);margin-bottom:6px;">No templates yet</div>
          <div style="font-size:13px;margin-bottom:16px;">Upload a template first â€” its placeholders become the fields we extract.</div>
          <button class="btn btn-primary" data-nav="templates">Upload a template</button>
        </div></div>
      ` : `
        <div class="field-grid" style="grid-template-columns:1fr;">
          ${state.templates.map(t => `
            <label class="card card-pad" style="display:flex;align-items:center;gap:14px;cursor:pointer;">
              <input type="radio" name="tpl-pick" value="${t.id}" style="width:16px;height:16px;" />
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">${t.name}</div>
                <div style="font-size:12px;color:var(--ink-soft);">${t.fields.length} fields detected Â· ${t.original_filename}</div>
              </div>
            </label>
          `).join("")}
        </div>
        <div class="form-row" style="margin-top:20px;">
          <label class="field-label">Report name</label>
          <input type="text" id="report-name" placeholder="e.g. Rajesh Kumar â€” Motor Claim, July 2026" />
        </div>
        <button class="btn btn-primary" id="wizard-next-1">Continue</button>
      `}
    `;
    document.querySelectorAll("[data-nav]").forEach(b => b.addEventListener("click", () => navigate(b.dataset.nav)));
    const nextBtn = document.getElementById("wizard-next-1");
    if (nextBtn) nextBtn.addEventListener("click", async () => {
      const picked = document.querySelector("input[name=tpl-pick]:checked");
      const name = document.getElementById("report-name").value.trim();
      if (!picked){ toast("Choose a template", "error"); return; }
      if (!name){ toast("Give this report a name", "error"); return; }
      nextBtn.disabled = true; nextBtn.innerHTML = `<div class="spinner"></div>`;
      try {
        const report = await api("/reports", { method: "POST", body: { template_id: picked.value, name } });
        newReportState.reportId = report.id;
        newReportState.step = 2;
        renderWizardStep();
      } catch (err) { toast(err.message, "error"); nextBtn.disabled = false; nextBtn.textContent = "Continue"; }
    });
  }

  else if (newReportState.step === 2){
    outlet.innerHTML = `
      <div class="page-head"><h1>Upload documents</h1><p>Policy documents, medical bills, ID cards, claim forms â€” drop them all in, mixed together.</p></div>
      ${stepper()}
      <div class="card card-pad">
        <div class="dropzone" id="doc-dropzone">
          ${ICON.upload}
          <div class="dropzone-title">Drop documents here</div>
          <div class="dropzone-sub">PDF, JPG, PNG â€” as many as this claim needs</div>
          <input type="file" id="doc-file" accept=".pdf,.jpg,.jpeg,.png,.webp" multiple class="hidden" />
        </div>
        <div id="doc-file-list"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn btn-ghost" id="wizard-back-2">Back</button>
          <button class="btn btn-primary" id="wizard-next-2" disabled>Upload &amp; start extraction</button>
        </div>
      </div>
    `;
    const dz = document.getElementById("doc-dropzone");
    const fileInput = document.getElementById("doc-file");
    const nextBtn = document.getElementById("wizard-next-2");

    dz.addEventListener("click", () => fileInput.click());
    ["dragover","dragenter"].forEach(evt => dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.add("drag"); }));
    ["dragleave","drop"].forEach(evt => dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.remove("drag"); }));
    dz.addEventListener("drop", (e) => addFiles([...e.dataTransfer.files]));
    fileInput.addEventListener("change", () => addFiles([...fileInput.files]));

    function addFiles(list){
      newReportState.files = newReportState.files.concat(list);
      renderFileList();
    }
    function renderFileList(){
      const box = document.getElementById("doc-file-list");
      box.innerHTML = newReportState.files.map((f,i) => `
        <div class="file-row">
          <div class="file-icon">${(f.name.split('.').pop()||'').slice(0,4).toUpperCase()}</div>
          <div class="file-name">${f.name}</div>
          <button class="file-remove" data-remove="${i}">Ã—</button>
        </div>
      `).join("");
      box.querySelectorAll("[data-remove]").forEach(b => b.addEventListener("click", () => {
        newReportState.files.splice(Number(b.dataset.remove), 1);
        renderFileList();
      }));
      nextBtn.disabled = newReportState.files.length === 0;
    }

    document.getElementById("wizard-back-2").addEventListener("click", () => { newReportState.step = 1; renderWizardStep(); });
    nextBtn.addEventListener("click", async () => {
      nextBtn.disabled = true; nextBtn.innerHTML = `<div class="spinner on-dark"></div> Uploadingâ€¦`;
      try {
        const fd = new FormData();
        newReportState.files.forEach(f => fd.append("files", f));
        await api(`/reports/${newReportState.reportId}/documents`, { method: "POST", body: fd, isForm: true });
        await api(`/reports/${newReportState.reportId}/extract`, { method: "POST" });
        newReportState.step = 3;
        navigate(`report/${newReportState.reportId}`);
      } catch (err) { toast(err.message, "error"); nextBtn.disabled = false; nextBtn.textContent = "Upload & start extraction"; }
    });
  }
}

  let body = "";
  if (r.status === "draft" || r.status === "extracting"){
    body = `
      <div class="scan-card">
        <div class="scan-title">${r.status === "draft" ? "Waiting to start" : "Reading your documentsâ€¦"}</div>
        <div class="scan-sub">${r.documents.length} document${r.documents.length===1?'':'s'} Â· Gemini extraction</div>
        <div class="scan-doc-list">
          ${r.documents.map(d => `
            <div class="scan-doc-row">
              <div class="scan-dot ${d.status === 'done' ? 'done' : d.status === 'processing' ? 'processing' : d.status === 'failed' ? 'failed' : ''}"></div>
              <span>${d.original_filename}</span>
              <span style="margin-left:auto;color:#9A958F;">${d.status}</span>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }
  else if (r.status === "review" || r.status === "failed"){
    const fields = Object.entries(r.merged_data || {});
    body = `
      ${r.status === "failed" ? `<div class="error-banner" style="margin-bottom:16px;">${r.error_message || "Extraction failed for one or more documents."}</div>` : ""}
      <div class="card card-pad">
        <h3 style="margin:0 0 4px;font-size:15px;">Review extracted fields</h3>
        <p style="margin:0 0 18px;font-size:13px;color:var(--ink-soft);">Edit anything that looks off before generating the final document. The chip shows which upload a value came from.</p>
        <div class="field-grid" id="review-field-grid">
          ${fields.map(([key, v]) => `
            <div class="field-card">
              <div class="field-card-top">
                <span class="field-name">${key.replace(/_/g," ")}</span>
                <span class="source-chip ${!v.source ? 'empty' : ''}">${v.source || "not found"}</span>
              </div>
              <input type="text" data-field-key="${key}" value="${v.value ? String(v.value).replace(/"/g,'&quot;') : ''}" placeholder="â€”" />
            </div>
          `).join("")}
        </div>
        <button class="btn btn-primary" id="generate-btn" style="margin-top:20px;">Save &amp; generate document</button>
      </div>
    `;
  }
  else if (r.status === "completed"){
    body = `
      <div class="card card-pad" style="text-align:center;padding:48px 24px;">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--lime-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#5A7300;">
          ${ICON.download}
        </div>
        <h3 style="margin:0 0 6px;">Document generated</h3>
        <p style="color:var(--ink-soft);font-size:13px;margin:0 0 20px;">The template has been filled and is ready to download.</p>
        <a class="btn btn-primary" id="download-btn" href="#">Download .docx</a>
      </div>
    `;
  }

  return `
    <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div>
        <h1>${r.name}</h1>
        <p>${fmtDate(r.created_at)}${r.owner_name && isStaff() ? " Â· " + r.owner_name : ""}</p>
      </div>
      ${statusBadge(r.status)}
    </div>
    ${body}
  `;
}

function bindReportDetailEvents(){
  const genBtn = document.getElementById("generate-btn");
  if (genBtn){
    genBtn.addEventListener("click", async () => {
      genBtn.disabled = true; genBtn.innerHTML = `<div class="spinner on-dark"></div> Generatingâ€¦`;
      const fields = {};
      document.querySelectorAll("[data-field-key]").forEach(inp => { fields[inp.dataset.fieldKey] = inp.value; });
      try {
        await api(`/reports/${state.currentReport.id}/fields`, { method: "PATCH", body: { fields } });
        state.currentReport = await api(`/reports/${state.currentReport.id}/generate`, { method: "POST" });
        document.getElementById("outlet").innerHTML = renderReportDetail();
        bindReportDetailEvents();
        toast("Document generated", "success");
      } catch (err) {
        toast(err.message, "error");
        genBtn.disabled = false; genBtn.textContent = "Save & generate document";
      }
    });
  }
  const dlBtn = document.getElementById("download-btn");
  if (dlBtn){
    dlBtn.addEventListener("click", (e) => {
      e.preventDefault();
      fetch(`${API_BASE}/reports/${state.currentReport.id}/download`, {
        headers: { Authorization: `Bearer ${state.token}` }
      }).then(res => res.blob()).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${state.currentReport.name}.docx`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }).catch(() => toast("Download failed", "error"));
    });
  }
}

/* ============================================================
   BOOT
   ============================================================ */
render();
</script>
</body>
</html>
